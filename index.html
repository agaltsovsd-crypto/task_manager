<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Мои задачи</title>

<!-- SDK Телеграма: даёт доступ к window.Telegram.WebApp -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
  /* ============================================================
     Цвета берём из темы Телеграма (var(--tg-theme-...)),
     чтобы приложение автоматически подстраивалось
     под светлую/тёмную тему пользователя.
     После двоеточия — запасной цвет для проверки в браузере.
     ============================================================ */
  :root {
    --bg: var(--tg-theme-bg-color, #f2f4f7);
    --card: var(--tg-theme-secondary-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #1c1f26);
    --hint: var(--tg-theme-hint-color, #8a919e);
    --accent: var(--tg-theme-button-color, #2f7de1);
    --accent-text: var(--tg-theme-button-text-color, #ffffff);
    --danger: #e5484d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px 16px 96px; /* снизу место под панель ввода */
  }

  /* ---------- Шапка с прогрессом ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  header h1 { font-size: 22px; font-weight: 700; }
  header .date { font-size: 13px; color: var(--hint); margin-top: 2px; }

  /* Кольцо прогресса: рисуется через conic-gradient */
  .ring {
    --p: 0; /* процент выполнения, задаётся из JS */
    width: 52px; height: 52px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) calc(var(--p) * 1%), color-mix(in srgb, var(--hint) 25%, transparent) 0);
    display: grid; place-items: center;
    transition: --p 0.3s;
  }
  .ring::before {
    content: attr(data-label);
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--bg);
    display: grid; place-items: center;
    font-size: 12px; font-weight: 600;
  }

  /* ---------- Фильтры ---------- */
  .filters { display: flex; gap: 8px; margin-bottom: 12px; }
  .filters button {
    border: none;
    background: var(--card);
    color: var(--hint);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 14px;
    cursor: pointer;
  }
  .filters button.active {
    background: var(--accent);
    color: var(--accent-text);
    font-weight: 600;
  }

  /* ---------- Список задач ---------- */
  #list { display: flex; flex-direction: column; gap: 8px; }

  .task {
    background: var(--card);
    border-radius: 14px;
    padding: 13px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: pop 0.18s ease;
  }
  @keyframes pop { from { transform: scale(0.97); opacity: 0; } }
  @media (prefers-reduced-motion: reduce) {
    .task { animation: none; }
  }

  /* Кружок-чекбокс */
  .check {
    width: 24px; height: 24px;
    min-width: 24px;
    border-radius: 50%;
    border: 2px solid var(--hint);
    background: none;
    cursor: pointer;
    display: grid; place-items: center;
    font-size: 13px;
    color: transparent;
  }
  .task.done .check {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-text);
  }

  .task .title { flex: 1; font-size: 16px; word-break: break-word; }
  .task.done .title { color: var(--hint); text-decoration: line-through; }

  .del {
    border: none; background: none;
    color: var(--hint);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 6px;
  }
  .del:active { color: var(--danger); }

  /* Пустое состояние */
  #empty {
    text-align: center;
    color: var(--hint);
    padding: 48px 16px;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ---------- Панель добавления (прижата к низу) ---------- */
  .composer {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: var(--bg);
    display: flex;
    gap: 8px;
  }
  .composer input {
    flex: 1;
    border: none;
    background: var(--card);
    color: var(--text);
    border-radius: 999px;
    padding: 13px 18px;
    font-size: 16px;
    outline: none;
  }
  .composer input::placeholder { color: var(--hint); }
  .composer button {
    border: none;
    background: var(--accent);
    color: var(--accent-text);
    width: 48px; height: 48px;
    min-width: 48px;
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;
  }
  .composer button:disabled { opacity: 0.4; }

  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Мои задачи</h1>
    <div class="date" id="date"></div>
  </div>
  <div class="ring" id="ring" data-label="0%"></div>
</header>

<div class="filters">
  <button data-filter="all" class="active">Все</button>
  <button data-filter="active">Активные</button>
  <button data-filter="done">Готово</button>
</div>

<div id="list"></div>
<div id="empty" hidden>Пока пусто.<br>Добавь первую задачу ниже 👇</div>

<div class="composer">
  <input id="input" type="text" placeholder="Новая задача…" maxlength="200">
  <button id="add" disabled aria-label="Добавить задачу">+</button>
</div>

<script>
/* ==============================================================
   ЛОГИКА ПРИЛОЖЕНИЯ
   Данные хранятся в облаке Телеграма (CloudStorage) —
   сервер не нужен, задачи привязаны к аккаунту пользователя.
   ============================================================== */

const tg = window.Telegram.WebApp;
tg.ready();   // сообщаем Телеграму, что приложение загрузилось
tg.expand();  // раскрываем на весь экран

const STORAGE_KEY = 'tasks_v1';

let tasks = [];        // [{ id, title, done }]
let filter = 'all';    // текущий фильтр

// --- Хранилище: CloudStorage в Телеграме, иначе просто память (для теста в браузере) ---
const storage = {
  save() {
    const json = JSON.stringify(tasks);
    if (tg.CloudStorage && tg.initData) {
      tg.CloudStorage.setItem(STORAGE_KEY, json, () => {});
    }
  },
  load(callback) {
    if (tg.CloudStorage && tg.initData) {
      tg.CloudStorage.getItem(STORAGE_KEY, (err, value) => {
        if (!err && value) {
          try { tasks = JSON.parse(value); } catch (e) { tasks = []; }
        }
        callback();
      });
    } else {
      callback(); // запуск вне Телеграма — начинаем с пустого списка
    }
  }
};

// --- Лёгкая вибрация при действиях (работает только в Телеграме) ---
function haptic(type) {
  try { tg.HapticFeedback.impactOccurred(type); } catch (e) {}
}

// --- Действия ---
function addTask(title) {
  tasks.unshift({ id: Date.now(), title, done: false });
  storage.save();
  haptic('light');
  render();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) t.done = !t.done;
  storage.save();
  haptic('light');
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  storage.save();
  haptic('medium');
  render();
}

// --- Отрисовка ---
const list = document.getElementById('list');
const empty = document.getElementById('empty');
const ring = document.getElementById('ring');

function render() {
  // прогресс в кольце
  const total = tasks.length;
  const doneCount = tasks.filter(t => t.done).length;
  const pct = total ? Math.round(doneCount / total * 100) : 0;
  ring.style.setProperty('--p', pct);
  ring.dataset.label = pct + '%';

  // фильтрация
  const visible = tasks.filter(t =>
    filter === 'all' ? true : filter === 'done' ? t.done : !t.done
  );

  list.innerHTML = '';
  empty.hidden = visible.length > 0;

  for (const t of visible) {
    const el = document.createElement('div');
    el.className = 'task' + (t.done ? ' done' : '');

    const check = document.createElement('button');
    check.className = 'check';
    check.textContent = '✓';
    check.setAttribute('aria-label', t.done ? 'Снять отметку' : 'Отметить выполненной');
    check.onclick = () => toggleTask(t.id);

    const title = document.createElement('div');
    title.className = 'title';
    title.textContent = t.title;

    const del = document.createElement('button');
    del.className = 'del';
    del.textContent = '✕';
    del.setAttribute('aria-label', 'Удалить задачу');
    del.onclick = () => deleteTask(t.id);

    el.append(check, title, del);
    list.appendChild(el);
  }
}

// --- Ввод новой задачи ---
const input = document.getElementById('input');
const addBtn = document.getElementById('add');

input.addEventListener('input', () => {
  addBtn.disabled = input.value.trim() === '';
});

function submit() {
  const title = input.value.trim();
  if (!title) return;
  addTask(title);
  input.value = '';
  addBtn.disabled = true;
}

addBtn.addEventListener('click', submit);
input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

// --- Фильтры ---
document.querySelectorAll('.filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.filters .active').classList.remove('active');
    btn.classList.add('active');
    filter = btn.dataset.filter;
    render();
  });
});

// --- Дата в шапке ---
document.getElementById('date').textContent =
  new Date().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });

// --- Старт: загружаем задачи и рисуем ---
storage.load(render);
</script>
</body>
</html>
