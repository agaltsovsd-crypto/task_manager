<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Мои задачи</title>

<!-- SDK Телеграма -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
  /* Цвета из темы Телеграма (после запятой — запасной вариант для браузера) */
  :root {
    --bg: var(--tg-theme-bg-color, #f2f4f7);
    --card: var(--tg-theme-secondary-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #1c1f26);
    --hint: var(--tg-theme-hint-color, #8a919e);
    --accent: var(--tg-theme-button-color, #2f7de1);
    --accent-text: var(--tg-theme-button-text-color, #ffffff);

    /* Приоритеты и сроки — фиксированные, работают в обеих темах */
    --p-high: #e5484d;
    --p-mid:  #f2a33c;
    --p-low:  #5b9dff;
    --overdue: #e5484d;
    --today: #f2a33c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px 16px 96px;
  }

  /* ---------- Шапка ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  header h1 { font-size: 22px; font-weight: 700; }
  header .date { font-size: 13px; color: var(--hint); margin-top: 2px; text-transform: capitalize; }

  .ring {
    --p: 0;
    width: 52px; height: 52px; min-width: 52px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) calc(var(--p) * 1%), color-mix(in srgb, var(--hint) 22%, transparent) 0);
    display: grid; place-items: center;
  }
  .ring::before {
    content: attr(data-label);
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--bg);
    display: grid; place-items: center;
    font-size: 12px; font-weight: 600;
  }

  /* ---------- Полоски фильтров ---------- */
  .chips {
    display: flex; gap: 8px;
    overflow-x: auto;
    margin-bottom: 8px;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    border: none;
    background: var(--card);
    color: var(--hint);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 14px;
    white-space: nowrap;
    cursor: pointer;
    flex-shrink: 0;
  }
  .chip.active { background: var(--accent); color: var(--accent-text); font-weight: 600; }

  /* ---------- Список ---------- */
  #list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }

  .task {
    position: relative;
    background: var(--card);
    border-radius: 14px;
    padding: 13px 14px 13px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    animation: pop 0.16s ease;
    overflow: hidden;
  }
  /* цветная полоска приоритета слева */
  .task[data-pr="high"]::before,
  .task[data-pr="medium"]::before,
  .task[data-pr="low"]::before {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px;
  }
  .task[data-pr="high"]::before   { background: var(--p-high); }
  .task[data-pr="medium"]::before { background: var(--p-mid); }
  .task[data-pr="low"]::before    { background: var(--p-low); }

  @keyframes pop { from { transform: scale(0.98); opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .task { animation: none; } }

  .check {
    width: 24px; height: 24px; min-width: 24px;
    margin-top: 1px;
    border-radius: 50%;
    border: 2px solid var(--hint);
    background: none; cursor: pointer;
    display: grid; place-items: center;
    font-size: 13px; color: transparent;
  }
  .task.done .check { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }

  .body { flex: 1; min-width: 0; cursor: pointer; }
  .body .title { font-size: 16px; word-break: break-word; line-height: 1.3; }
  .task.done .title { color: var(--hint); text-decoration: line-through; }

  /* строка меток под названием */
  .meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .meta:empty { display: none; }
  .tag {
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 6px;
    background: color-mix(in srgb, var(--hint) 15%, transparent);
    color: var(--hint);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .tag.due-over  { background: color-mix(in srgb, var(--overdue) 18%, transparent); color: var(--overdue); }
  .tag.due-today { background: color-mix(in srgb, var(--today) 20%, transparent); color: var(--today); }

  #empty {
    text-align: center; color: var(--hint);
    padding: 48px 16px; font-size: 15px; line-height: 1.5;
  }

  /* ---------- Панель добавления ---------- */
  .composer {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: var(--bg);
    display: flex; gap: 8px;
    z-index: 20;
  }
  .composer input {
    flex: 1; border: none;
    background: var(--card); color: var(--text);
    border-radius: 999px; padding: 13px 18px;
    font-size: 16px; outline: none;
  }
  .composer input::placeholder { color: var(--hint); }
  .composer button {
    border: none; background: var(--accent); color: var(--accent-text);
    width: 48px; height: 48px; min-width: 48px;
    border-radius: 50%; font-size: 22px; cursor: pointer;
  }
  .composer button:disabled { opacity: 0.4; }

  /* ---------- Карточка задачи (детали) ---------- */
  .sheet {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 50;
    transform: translateY(100%);
    transition: transform 0.25s ease;
    overflow-y: auto;
    padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
  }
  .sheet.open { transform: translateY(0); }
  @media (prefers-reduced-motion: reduce) { .sheet { transition: none; } }

  .sheet h2 { font-size: 13px; color: var(--hint); font-weight: 600; margin: 18px 0 8px; text-transform: uppercase; letter-spacing: .03em; }
  .sheet h2:first-of-type { margin-top: 8px; }

  .field-title {
    width: 100%; border: none; outline: none;
    background: var(--card); color: var(--text);
    border-radius: 12px; padding: 14px;
    font-size: 18px; font-weight: 600;
  }

  /* кнопки приоритета */
  .prio-row { display: flex; gap: 8px; }
  .prio {
    flex: 1; border: 2px solid transparent;
    background: var(--card); color: var(--text);
    padding: 11px; border-radius: 12px;
    font-size: 14px; cursor: pointer;
  }
  .prio[data-v="high"].sel   { border-color: var(--p-high); color: var(--p-high); font-weight: 600; }
  .prio[data-v="medium"].sel { border-color: var(--p-mid);  color: var(--p-mid);  font-weight: 600; }
  .prio[data-v="low"].sel    { border-color: var(--p-low);  color: var(--p-low);  font-weight: 600; }
  .prio[data-v="none"].sel   { border-color: var(--hint);   color: var(--hint);   font-weight: 600; }

  .field {
    width: 100%; border: none; outline: none;
    background: var(--card); color: var(--text);
    border-radius: 12px; padding: 13px 14px; font-size: 16px;
  }
  input[type="date"].field { min-height: 48px; }

  /* подзадачи */
  .sub {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 6px;
  }
  .sub .check { width: 20px; height: 20px; min-width: 20px; font-size: 11px; }
  .sub span { flex: 1; font-size: 15px; word-break: break-word; }
  .sub.sdone span { color: var(--hint); text-decoration: line-through; }
  .sub .x { border: none; background: none; color: var(--hint); font-size: 16px; cursor: pointer; padding: 2px 4px; }
  .sub-add { display: flex; gap: 8px; margin-top: 8px; }
  .sub-add input {
    flex: 1; border: none; outline: none;
    background: var(--card); color: var(--text);
    border-radius: 10px; padding: 11px 13px; font-size: 15px;
  }
  .sub-add button {
    border: none; background: color-mix(in srgb, var(--accent) 18%, transparent);
    color: var(--accent); border-radius: 10px; padding: 0 16px;
    font-size: 20px; cursor: pointer;
  }

  .delete-btn {
    width: 100%; margin-top: 28px;
    border: none; background: color-mix(in srgb, var(--p-high) 14%, transparent);
    color: var(--p-high); border-radius: 12px;
    padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer;
  }

  /* ---------- Тост отмены ---------- */
  .toast {
    position: fixed; left: 16px; right: 16px; bottom: 84px;
    background: var(--text); color: var(--bg);
    border-radius: 12px; padding: 13px 16px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 15px; z-index: 40;
    transform: translateY(150%); transition: transform 0.25s ease;
  }
  .toast.show { transform: translateY(0); }
  .toast button {
    border: none; background: none; color: var(--accent);
    font-size: 15px; font-weight: 700; cursor: pointer;
  }

  button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Мои задачи</h1>
    <div class="date" id="date"></div>
  </div>
  <div class="ring" id="ring" data-label="0%"></div>
</header>

<!-- фильтр по статусу -->
<div class="chips" id="statusFilter">
  <button class="chip active" data-filter="all">Все</button>
  <button class="chip" data-filter="active">Активные</button>
  <button class="chip" data-filter="done">Готово</button>
</div>

<!-- фильтр по категориям (заполняется из задач) -->
<div class="chips" id="catFilter"></div>

<div id="list"></div>
<div id="empty" hidden>Пока пусто.<br>Добавь первую задачу ниже 👇</div>

<!-- панель добавления -->
<div class="composer">
  <input id="input" type="text" placeholder="Новая задача…" maxlength="200">
  <button id="add" disabled aria-label="Добавить">+</button>
</div>

<!-- карточка деталей задачи -->
<div class="sheet" id="sheet">
  <input class="field-title" id="d-title" maxlength="200" placeholder="Название задачи">

  <h2>Приоритет</h2>
  <div class="prio-row" id="d-prio">
    <button class="prio" data-v="high">Высокий</button>
    <button class="prio" data-v="medium">Средний</button>
    <button class="prio" data-v="low">Низкий</button>
    <button class="prio" data-v="none">—</button>
  </div>

  <h2>Срок</h2>
  <input class="field" id="d-due" type="date">

  <h2>Категория</h2>
  <input class="field" id="d-cat" list="cat-list" maxlength="30" placeholder="Напр. Работа, Дом, Учёба">
  <datalist id="cat-list"></datalist>

  <h2>Подзадачи</h2>
  <div id="d-subs"></div>
  <div class="sub-add">
    <input id="d-sub-input" maxlength="120" placeholder="Добавить пункт…">
    <button id="d-sub-add" aria-label="Добавить пункт">+</button>
  </div>

  <button class="delete-btn" id="d-delete">Удалить задачу</button>
</div>

<!-- тост отмены удаления -->
<div class="toast" id="toast">
  <span>Задача удалена</span>
  <button id="undo">Отменить</button>
</div>

<script>
/* ==============================================================
   Данные хранятся в облаке Телеграма (CloudStorage).
   Одна задача:
   { id, title, done, priority, due, category, subtasks: [{id,title,done}] }
   ============================================================== */

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const STORAGE_KEY = 'tasks_v2';
let tasks = [];
let statusFilter = 'all';   // all | active | done
let catFilter = null;       // null = все категории
let openId = null;          // id открытой в карточке задачи
let lastDeleted = null;     // для «Отменить»
let toastTimer = null;

/* ---------- Хранилище ---------- */
const storage = {
  save() {
    if (tg.CloudStorage && tg.initData) {
      tg.CloudStorage.setItem(STORAGE_KEY, JSON.stringify(tasks), () => {});
    }
  },
  load(cb) {
    if (tg.CloudStorage && tg.initData) {
      tg.CloudStorage.getItem(STORAGE_KEY, (err, val) => {
        if (!err && val) { try { tasks = JSON.parse(val); } catch (e) {} }
        cb();
      });
    } else { cb(); }
  }
};

function haptic(t) { try { tg.HapticFeedback.impactOccurred(t); } catch (e) {} }
const uid = () => Date.now() + Math.floor(Math.random() * 1000);

/* ---------- Работа с датами ---------- */
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function dueInfo(due) {
  if (!due) return null;
  const d = new Date(due + 'T00:00:00');
  const t = new Date(todayStr() + 'T00:00:00');
  const diff = Math.round((d - t) / 86400000);
  let cls = '', label;
  if (diff < 0) { cls = 'due-over'; label = 'Просрочено'; }
  else if (diff === 0) { cls = 'due-today'; label = 'Сегодня'; }
  else if (diff === 1) { label = 'Завтра'; }
  else { label = d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }); }
  return { cls, label };
}

/* ---------- CRUD ---------- */
function addTask(title) {
  tasks.unshift({ id: uid(), title, done: false, priority: null, due: null, category: null, subtasks: [] });
  storage.save(); haptic('light'); render();
}
function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) t.done = !t.done;
  storage.save(); haptic('light'); render();
}
function deleteTask(id) {
  const idx = tasks.findIndex(t => t.id === id);
  if (idx === -1) return;
  lastDeleted = { task: tasks[idx], index: idx };
  tasks.splice(idx, 1);
  storage.save(); haptic('medium'); render();
  showToast();
}

/* ---------- Отрисовка списка ---------- */
const list = document.getElementById('list');
const empty = document.getElementById('empty');
const ring = document.getElementById('ring');
const catFilterEl = document.getElementById('catFilter');
const PRIO_ORDER = { high: 0, medium: 1, low: 2 };

function render() {
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  ring.style.setProperty('--p', pct);
  ring.dataset.label = pct + '%';

  renderCatFilter();

  let visible = tasks.filter(t => {
    if (statusFilter === 'done' && !t.done) return false;
    if (statusFilter === 'active' && t.done) return false;
    if (catFilter && t.category !== catFilter) return false;
    return true;
  });

  visible.sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const pa = a.priority ? PRIO_ORDER[a.priority] : 3;
    const pb = b.priority ? PRIO_ORDER[b.priority] : 3;
    if (pa !== pb) return pa - pb;
    if (a.due && b.due) return a.due < b.due ? -1 : 1;
    if (a.due) return -1;
    if (b.due) return 1;
    return 0;
  });

  list.innerHTML = '';
  empty.hidden = visible.length > 0;

  for (const t of visible) {
    const el = document.createElement('div');
    el.className = 'task' + (t.done ? ' done' : '');
    if (t.priority) el.dataset.pr = t.priority;

    const check = document.createElement('button');
    check.className = 'check';
    check.textContent = '✓';
    check.setAttribute('aria-label', 'Выполнено');
    check.onclick = (e) => { e.stopPropagation(); toggleTask(t.id); };

    const body = document.createElement('div');
    body.className = 'body';
    body.onclick = () => openDetail(t.id);

    const title = document.createElement('div');
    title.className = 'title';
    title.textContent = t.title;
    body.appendChild(title);

    const meta = document.createElement('div');
    meta.className = 'meta';
    if (t.category) {
      const c = document.createElement('span');
      c.className = 'tag';
      c.textContent = t.category;
      meta.appendChild(c);
    }
    const di = dueInfo(t.due);
    if (di && !t.done) {
      const d = document.createElement('span');
      d.className = 'tag ' + di.cls;
      d.textContent = '📅 ' + di.label;
      meta.appendChild(d);
    }
    if (t.subtasks && t.subtasks.length) {
      const doneSubs = t.subtasks.filter(s => s.done).length;
      const s = document.createElement('span');
      s.className = 'tag';
      s.textContent = '☑ ' + doneSubs + '/' + t.subtasks.length;
      meta.appendChild(s);
    }
    body.appendChild(meta);

    el.append(check, body);
    list.appendChild(el);
  }
}

function renderCatFilter() {
  const cats = [...new Set(tasks.map(t => t.category).filter(Boolean))];
  catFilterEl.innerHTML = '';
  if (!cats.length) { catFilter = null; return; }

  const allBtn = mkChip('Все категории', catFilter === null);
  allBtn.onclick = () => { catFilter = null; render(); };
  catFilterEl.appendChild(allBtn);

  for (const c of cats) {
    const b = mkChip(c, catFilter === c);
    b.onclick = () => { catFilter = c; render(); };
    catFilterEl.appendChild(b);
  }
}
function mkChip(text, active) {
  const b = document.createElement('button');
  b.className = 'chip' + (active ? ' active' : '');
  b.textContent = text;
  return b;
}

/* ---------- Карточка деталей ---------- */
const sheet = document.getElementById('sheet');
const dTitle = document.getElementById('d-title');
const dPrio = document.getElementById('d-prio');
const dDue = document.getElementById('d-due');
const dCat = document.getElementById('d-cat');
const dSubs = document.getElementById('d-subs');
const dSubInput = document.getElementById('d-sub-input');

function openDetail(id) {
  openId = id;
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  dTitle.value = t.title;
  dDue.value = t.due || '';
  dCat.value = t.category || '';
  setPrioButtons(t.priority);
  renderSubs(t);
  updateCatList();
  sheet.classList.add('open');
  tg.BackButton.show();
}

function closeDetail() {
  const t = tasks.find(t => t.id === openId);
  if (t) {
    const nt = dTitle.value.trim();
    if (nt) t.title = nt;
    t.due = dDue.value || null;
    t.category = dCat.value.trim() || null;
    storage.save();
  }
  openId = null;
  sheet.classList.remove('open');
  tg.BackButton.hide();
  render();
}

function setPrioButtons(value) {
  dPrio.querySelectorAll('.prio').forEach(b => {
    b.classList.toggle('sel', b.dataset.v === (value || 'none'));
  });
}
dPrio.querySelectorAll('.prio').forEach(btn => {
  btn.onclick = () => {
    const t = tasks.find(t => t.id === openId);
    if (!t) return;
    const v = btn.dataset.v;
    t.priority = v === 'none' ? null : v;
    setPrioButtons(t.priority);
    storage.save(); haptic('light');
  };
});

function renderSubs(t) {
  dSubs.innerHTML = '';
  for (const s of (t.subtasks || [])) {
    const row = document.createElement('div');
    row.className = 'sub' + (s.done ? ' sdone' : '');
    const c = document.createElement('button');
    c.className = 'check';
    c.textContent = '✓';
    c.onclick = () => { s.done = !s.done; storage.save(); haptic('light'); renderSubs(t); };
    const span = document.createElement('span');
    span.textContent = s.title;
    const x = document.createElement('button');
    x.className = 'x';
    x.textContent = '✕';
    x.onclick = () => { t.subtasks = t.subtasks.filter(i => i.id !== s.id); storage.save(); renderSubs(t); };
    row.append(c, span, x);
    dSubs.appendChild(row);
  }
}

function addSub() {
  const t = tasks.find(t => t.id === openId);
  const val = dSubInput.value.trim();
  if (!t || !val) return;
  if (!t.subtasks) t.subtasks = [];
  t.subtasks.push({ id: uid(), title: val, done: false });
  dSubInput.value = '';
  storage.save(); haptic('light'); renderSubs(t);
}
document.getElementById('d-sub-add').onclick = addSub;
dSubInput.addEventListener('keydown', e => { if (e.key === 'Enter') addSub(); });

document.getElementById('d-delete').onclick = () => {
  const id = openId;
  closeDetail();
  deleteTask(id);
};

function updateCatList() {
  const cats = [...new Set(tasks.map(t => t.category).filter(Boolean))];
  const dl = document.getElementById('cat-list');
  dl.innerHTML = '';
  for (const c of cats) {
    const o = document.createElement('option');
    o.value = c;
    dl.appendChild(o);
  }
}

tg.BackButton.onClick(closeDetail);

/* ---------- Добавление задачи ---------- */
const input = document.getElementById('input');
const addBtn = document.getElementById('add');
input.addEventListener('input', () => { addBtn.disabled = input.value.trim() === ''; });
function submit() {
  const v = input.value.trim();
  if (!v) return;
  addTask(v);
  input.value = ''; addBtn.disabled = true;
}
addBtn.onclick = submit;
input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

/* ---------- Фильтр по статусу ---------- */
document.getElementById('statusFilter').querySelectorAll('.chip').forEach(btn => {
  btn.onclick = () => {
    document.querySelector('#statusFilter .active').classList.remove('active');
    btn.classList.add('active');
    statusFilter = btn.dataset.filter;
    render();
  };
});

/* ---------- Тост «Отменить» ---------- */
const toast = document.getElementById('toast');
function showToast() {
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.classList.remove('show'); lastDeleted = null; }, 4000);
}
document.getElementById('undo').onclick = () => {
  if (!lastDeleted) return;
  tasks.splice(lastDeleted.index, 0, lastDeleted.task);
  lastDeleted = null;
  toast.classList.remove('show');
  storage.save(); haptic('light'); render();
};

/* ---------- Дата в шапке ---------- */
document.getElementById('date').textContent =
  new Date().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });

/* ---------- Старт ---------- */
storage.load(render);
</script>
